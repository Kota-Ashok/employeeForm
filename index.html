<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Information Form</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="card">
    <h1>Employee Information Form</h1>

    <form id="employeeForm">
      <!-- Section 1: Personal Information -->
      <section class="form-section">
        <h2 class="section-header">Personal Information</h2>
        <div class="form-grid">
          <div class="input-group" id="group-aadhaarSearch">
            <label for="input-aadhaarSearch">Aadhaar Search option</label>
            <div class="input-with-action">
              <input type="text" id="input-aadhaarSearch" name="aadhaarSearch" value=""
                placeholder="Search by Aadhaar...">
              <button type="button" class="action-button" id="btn-aadhaarSearch">Search</button>
            </div>
            <span class="error-message" id="error-aadhaarSearch"></span>
          </div>
          <div class="input-group" id="group-aadhaarNumber">
            <label for="input-aadhaarNumber">Aadhaar Number *</label>
            <input type="text" id="input-aadhaarNumber" name="aadhaarNumber" value="" required>
            <span class="error-message" id="error-aadhaarNumber"></span>
          </div>
          <div class="input-group" id="group-cfmsId">
            <label for="input-cfmsId">CFMS ID *</label>
            <input type="text" id="input-cfmsId" name="cfmsId" value="" required>
            <span class="error-message" id="error-cfmsId"></span>
          </div>
          <div class="input-group" id="group-title">
            <label for="input-title">Title *</label>
            <select id="input-title" name="title" required>
              <option value="" disabled selected>Select Title</option>
              <option value="Mr">Mr</option>
              <option value="Mrs">Mrs</option>
              <option value="Ms">Ms</option>
              <option value="Dr">Dr</option>
              <option value="Prof">Prof</option>
            </select>
            <span class="error-message" id="error-title"></span>
          </div>
          <div class="input-group" id="group-name">
            <label for="input-name">Name *</label>
            <input type="text" id="input-name" name="name" value="" required>
            <span class="error-message" id="error-name"></span>
          </div>
          <div class="input-group" id="group-fatherName">
            <label for="input-fatherName">Father Name *</label>
            <input type="text" id="input-fatherName" name="fatherName" value="" required>
            <span class="error-message" id="error-fatherName"></span>
          </div>
          <div class="input-group" id="group-dob">
            <label for="input-dob">Date of Birth (MM/DD/YYYY) *</label>
            <input type="date" id="input-dob" name="dob" value="" required>
            <span class="error-message" id="error-dob"></span>
          </div>
          <div class="input-group" id="group-joiningDate">
            <label for="input-joiningDate">Date of Joining (MM/DD/YYYY) *</label>
            <input type="date" id="input-joiningDate" name="joiningDate" value="" required>
            <span class="error-message" id="error-joiningDate"></span>
          </div>
          <div class="input-group" id="group-gender">
            <label for="input-gender">Gender *</label>
            <select id="input-gender" name="gender" required>
              <option value="" disabled selected>Select Gender</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
            <span class="error-message" id="error-gender"></span>
          </div>
          <div class="input-group" id="group-maritalStatus">
            <label for="input-maritalStatus">Marital Status</label>
            <select id="input-maritalStatus" name="maritalStatus">
              <option value="" disabled selected>Select Marital Status</option>
              <option value="single">Single</option>
              <option value="married">Married</option>
              <option value="widow">Widow</option>
              <option value="divorced">Divorced</option>
            </select>
            <span class="error-message" id="error-maritalStatus"></span>
          </div>
          <div class="input-group" id="group-spouseName" style="display: none;">
            <label for="input-spouseName">Spouse Name</label>
            <input type="text" id="input-spouseName" name="spouseName" value="">
            <span class="error-message" id="error-spouseName"></span>
          </div>
          <div class="input-group" id="group-caste">
            <label for="input-caste">Caste</label>
            <select id="input-caste" name="caste">
              <option value="" disabled selected>Select Caste</option>
              <option value="oc">OC</option>
              <option value="bc_a">BC-A</option>
              <option value="bc_b">BC-B</option>
              <option value="bc_c">BC-C</option>
              <option value="bc_d">BC-D</option>
              <option value="bc_e">BC-E</option>
              <option value="sc">SC</option>
              <option value="st">ST</option>
            </select>
            <span class="error-message" id="error-caste"></span>
          </div>
          <div class="input-group" id="group-religion">
            <label for="input-religion">Religion</label>
            <select id="input-religion" name="religion">
              <option value="" disabled selected>Select Religion</option>
              <option value="hindu">Hindu</option>
              <option value="muslim">Muslim</option>
              <option value="christian">Christian</option>
              <option value="sikh">Sikh</option>
              <option value="buddhist">Buddhist</option>
              <option value="jain">Jain</option>
              <option value="others">Others</option>
            </select>
            <span class="error-message" id="error-religion"></span>
          </div>
          <div class="input-group" id="group-highestEducation">
            <label for="input-highestEducation">Highest Education Qualification</label>
            <input list="list-highestEducation" id="input-highestEducation" name="highestEducation"
              placeholder="Type to search...">
            <datalist id="list-highestEducation">
              <option value="Below SSC"></option>
              <option value="SSC"></option>
              <option value="HSC"></option>
              <option value="Graduation"></option>
              <option value="Masters/Post Graduate"></option>
              <option value="Professional(CA,CS,CMA,ect…)"></option>
              <option value="Diploma"></option>
              <option value="Graduation"></option>
              <option value="B.Ed"></option>
              <option value="post Graduation"></option>
              <option value="M.Phil"></option>
              <option value="M.Ed"></option>
              <option value="T.T.C"></option>
              <option value="Ph.D"></option>
              <option value="LLB/BL"></option>
              <option value="Technical Qualification"></option>
              <option value="B.P.Ed"></option>
              <option value="M.P.Ed"></option>
              <option value="U.G.D.P.Ed"></option>
              <option value="Others"></option>

            </datalist>
            <span class="error-message" id="error-highestEducation"></span>
          </div>
          <div class="input-group" id="group-isPhysicalChallenged">
            <label for="input-isPhysicalChallenged">Physical challenged category</label>
            <select id="input-isPhysicalChallenged" name="isPhysicalChallenged">
              <option value="" disabled selected>Select Physical challenged category</option>
              <option value="yes">Yes</option>
              <option value="no">No</option>
            </select>
            <span class="error-message" id="error-isPhysicalChallenged"></span>
          </div>
          <div class="input-group" id="group-physicalChallengedPercentage" style="display: none;">
            <label for="input-physicalChallengedPercentage">Percentage (%)</label>
            <select id="input-physicalChallengedPercentage" name="physicalChallengedPercentage">
              <option value="" disabled selected>Select percentage...</option>
            </select>
            <span class="error-message" id="error-physicalChallengedPercentage"></span>
          </div>
          <div class="input-group" id="group-panNumber">
            <label for="input-panNumber">PAN Number *</label>
            <input type="text" id="input-panNumber" name="panNumber" value="" required>
            <span class="error-message" id="error-panNumber"></span>
          </div>
          <div class="input-group" id="group-mobileNumber">
            <label for="input-mobileNumber">Mobile Number *</label>
            <input type="tel" id="input-mobileNumber" name="mobileNumber" value="" required>
            <span class="error-message" id="error-mobileNumber"></span>
          </div>
        </div>
      </section>

            <input type="text" id="input-bankAndBranch" name="bankAndBranch" value="" required>
            <span class="error-message" id="error-bankAndBranch"></span>
          </div>
